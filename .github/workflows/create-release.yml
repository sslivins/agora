name: Build & Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/**'
      - 'tests/**'
      - '.gitleaks.toml'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      is-main: ${{ steps.check-branch.outputs.is-main }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine branch context
        id: check-branch
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "is-main=true" >> "$GITHUB_OUTPUT"
            echo "🚀 Main branch — will create release"
          else
            echo "is-main=false" >> "$GITHUB_OUTPUT"
            echo "🔧 Feature branch — will build artifact only"
          fi

      - name: Read version from source
        id: version
        run: |
          base_version=$(python3 -c "exec(open('api/__init__.py').read()); print(__version__)")
          if [ "${{ steps.check-branch.outputs.is-main }}" = "true" ]; then
            version="$base_version"
          else
            # Append ~rc.<short-sha> so dpkg treats it as lower than the release version
            short_sha=$(git rev-parse --short=7 HEAD)
            version="${base_version}~rc.g${short_sha}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v${base_version}" >> "$GITHUB_OUTPUT"
          echo "Detected version: $version"

      - name: Check tag does not already exist
        if: steps.check-branch.outputs.is-main == 'true'
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ steps.version.outputs.tag }} already exists. Bump the version in api/__init__.py first."
            exit 1
          fi

      - name: Build .deb package
        run: bash packaging/build-deb.sh "${{ steps.version.outputs.version }}"

      - name: Upload .deb as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: agora-${{ steps.version.outputs.version }}-deb
          path: build/*.deb
          retention-days: 30

      - name: Smoke-test .deb before publishing
        # Gates the release: if the .deb can't be extracted, has broken
        # systemd ExecStart paths, or any entry point fails to import,
        # we must not tag or publish. Runs inside debian:trixie-slim
        # (the pi-gen image base) for a faithful import environment.
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            debian:trixie-slim \
            bash -c '
              set -euo pipefail
              apt-get update -qq
              apt-get install -y -qq --no-install-recommends \
                python3 python3-venv python3-pip dpkg-dev \
                python3-gi python3-cairo \
                gir1.2-glib-2.0 gir1.2-pango-1.0 gir1.2-gstreamer-1.0
              bash packaging/smoke-test-deb.sh \
                "build/agora_${{ steps.version.outputs.version }}_arm64.deb"
            '

      - name: Create and push tag
        if: steps.check-branch.outputs.is-main == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Generate changelog
        if: steps.check-branch.outputs.is-main == 'true'
        id: changelog
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -n1)
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi
          echo "Generating changelog: ${PREV_TAG:-initial}..${TAG}"

          FEATURES=$(git log ${RANGE} --oneline --no-merges --grep="^feat" | sed 's/^[a-f0-9]* feat[^:]*: //' || true)
          FIXES=$(git log ${RANGE} --oneline --no-merges --grep="^fix" | sed 's/^[a-f0-9]* fix[^:]*: //' || true)
          PERF=$(git log ${RANGE} --oneline --no-merges --grep="^perf" | sed 's/^[a-f0-9]* perf[^:]*: //' || true)
          REFACTORS=$(git log ${RANGE} --oneline --no-merges --grep="^refactor" | sed 's/^[a-f0-9]* refactor[^:]*: //' || true)
          TESTS=$(git log ${RANGE} --oneline --no-merges --grep="^test" | sed 's/^[a-f0-9]* test[^:]*: //' || true)
          DOCS=$(git log ${RANGE} --oneline --no-merges --grep="^docs" | sed 's/^[a-f0-9]* docs[^:]*: //' || true)
          CI_CHANGES=$(git log ${RANGE} --oneline --no-merges --grep="^ci" | sed 's/^[a-f0-9]* ci[^:]*: //' || true)
          CHORE=$(git log ${RANGE} --oneline --no-merges --grep="^chore" | sed 's/^[a-f0-9]* chore[^:]*: //' || true)

          # Collect commit hashes that matched a category
          MATCHED=$(git log ${RANGE} --oneline --no-merges --grep="^feat\|^fix\|^perf\|^refactor\|^test\|^docs\|^ci\|^chore" --format="%h" || true)
          # All commits
          ALL=$(git log ${RANGE} --oneline --no-merges --format="%h %s" || true)
          # Other = commits not matching any conventional prefix
          OTHER=""
          while IFS= read -r line; do
            hash=$(echo "$line" | cut -d' ' -f1)
            if ! echo "$MATCHED" | grep -q "^${hash}$"; then
              msg=$(echo "$line" | cut -d' ' -f2-)
              OTHER="${OTHER}${msg}"$'\n'
            fi
          done <<< "$ALL"
          OTHER=$(echo "$OTHER" | sed '/^$/d')

          {
            echo "## Agora ${TAG}"
            echo ""
            if [ -n "$FEATURES" ]; then
              echo "### ✨ Features"
              echo "$FEATURES" | while IFS= read -r line; do echo "- $line"; done
              echo ""
            fi
            if [ -n "$FIXES" ]; then
              echo "### 🐛 Fixes"
              echo "$FIXES" | while IFS= read -r line; do echo "- $line"; done
              echo ""
            fi
            if [ -n "$PERF" ]; then
              echo "### ⚡ Performance"
              echo "$PERF" | while IFS= read -r line; do echo "- $line"; done
              echo ""
            fi
            if [ -n "$REFACTORS" ]; then
              echo "### ♻️ Refactors"
              echo "$REFACTORS" | while IFS= read -r line; do echo "- $line"; done
              echo ""
            fi
            if [ -n "$TESTS" ]; then
              echo "### 🧪 Tests"
              echo "$TESTS" | while IFS= read -r line; do echo "- $line"; done
              echo ""
            fi
            if [ -n "$DOCS" ]; then
              echo "### 📝 Documentation"
              echo "$DOCS" | while IFS= read -r line; do echo "- $line"; done
              echo ""
            fi
            if [ -n "$CI_CHANGES" ]; then
              echo "### 🔧 CI"
              echo "$CI_CHANGES" | while IFS= read -r line; do echo "- $line"; done
              echo ""
            fi
            if [ -n "$CHORE" ]; then
              echo "### 🧹 Chores"
              echo "$CHORE" | while IFS= read -r line; do echo "- $line"; done
              echo ""
            fi
            if [ -n "$OTHER" ]; then
              echo "### 📦 Other"
              echo "$OTHER" | while IFS= read -r line; do echo "- $line"; done
              echo ""
            fi
            echo "---"
            echo ""
            echo "**Full diff:** [\`${PREV_TAG:-initial}...${TAG}\`](https://github.com/${{ github.repository }}/compare/${PREV_TAG:-$(git rev-list --max-parents=0 HEAD | head -1)}...${TAG})"
          } > /tmp/release_body.md

          echo "📋 Generated changelog:"
          cat /tmp/release_body.md

      - name: Create GitHub Release
        if: steps.check-branch.outputs.is-main == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Agora ${{ steps.version.outputs.tag }}
          body_path: /tmp/release_body.md
          files: build/*.deb

  publish-apt:
    needs: build
    if: needs.build.outputs.is-main == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0
        continue-on-error: true

      - name: Initialize gh-pages if needed
        run: |
          if [ ! -f index.html ]; then
            git checkout --orphan gh-pages 2>/dev/null || true
            git rm -rf . 2>/dev/null || true
            echo "<html><body><h1>Agora APT Repository</h1><p>See README for usage.</p></body></html>" > index.html
            mkdir -p pool dists/stable/main/binary-arm64
          fi

      - name: Download .deb from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p pool
          gh release download "${{ needs.build.outputs.tag }}" --pattern "*.deb" --dir pool/ --clobber

      - name: Generate APT repository metadata
        run: |
          cd $GITHUB_WORKSPACE

          # Generate Packages file
          dpkg-scanpackages --arch arm64 pool/ > dists/stable/main/binary-arm64/Packages
          gzip -kf dists/stable/main/binary-arm64/Packages

          # Generate Release file
          cd dists/stable
          cat > Release <<EOF
          Origin: sslivins
          Label: Agora
          Suite: stable
          Codename: stable
          Architectures: arm64
          Components: main
          Description: Agora media playback system for Raspberry Pi
          EOF
          # Add checksums
          apt-ftparchive release . >> Release

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update apt repo: ${{ needs.build.outputs.tag }}"
          git push origin gh-pages

  # Commit the auto-incremented version back to main so the next release
  # starts from a fresh version. Runs only after publish-apt succeeds,
  # so a failed release does not advance the version on main. The commit
  # uses "[skip ci]" to avoid re-triggering Tests/etc on the bump itself.
  bump-main:
    needs: [build, publish-apt]
    if: needs.build.outputs.is-main == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          # GITHUB_TOKEN works if main is unprotected, or if
          # github-actions[bot] is on the branch-protection bypass list.
          # If main is PR-protected and the bot can't bypass, the repo
          # secret VERSION_BUMP_TOKEN (a fine-grained PAT with contents:
          # write on this repo) is used instead.
          token: ${{ secrets.VERSION_BUMP_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Bump patch version and push
        run: |
          set -euo pipefail
          current=$(python3 -c "exec(open('api/__init__.py').read()); print(__version__)")
          IFS=. read -r major minor patch <<< "$current"
          next="${major}.${minor}.$((patch + 1))"
          echo "Bumping: $current → $next"
          if [ "$current" = "$next" ]; then
            echo "api/__init__.py is already at $next — nothing to commit."
            exit 0
          fi
          sed -i "s/^__version__ = .*/__version__ = \"$next\"/" api/__init__.py
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api/__init__.py
          git commit -m "chore: bump version to $next [skip ci]" \
                     -m "Auto-bumped by create-release.yml after ${{ needs.build.outputs.tag }}." \
                     -m "Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
          git push origin HEAD:main
