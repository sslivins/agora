name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements-api.txt
          pip install pytest pytest-asyncio httpx
          pip install pytest-playwright
          pip install "cryptography>=44,<46"
          playwright install --with-deps chromium

      - name: Run tests
        run: |
          python -m pytest tests/ --ignore=tests/test_wss_e2e.py --ignore=tests/test_cms_url_reconnect.py --tb=short -q
          python -m pytest tests/test_cms_url_reconnect.py --tb=short -q
          python -m pytest tests/test_wss_e2e.py --tb=short -q
