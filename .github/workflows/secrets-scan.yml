name: Secrets Scan

# Scans the repo (including git history) for leaked credentials on
# every PR and on pushes to main. Required in branch protection —
# a leak should block the merge. False positives can be allowlisted
# in .gitleaks.toml.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "37 6 * * 1"  # weekly Monday sweep

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so the scan sees historical commits

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # GITLEAKS_LICENSE is only needed for orgs — public repos don't
          # require it. Leaving it unset on the action lets the OSS edition run.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml
