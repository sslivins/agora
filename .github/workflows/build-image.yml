name: Build Pi Image

on:
  workflow_dispatch:
    inputs:
      board:
        description: 'Board to build for (or "all")'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - zero2w
          - pi4
          - pi5

permissions:
  contents: write

env:
  # Pin pi-gen to latest arm64 branch commit (Mar 17, 2026)
  # Uses Debian trixie for the arm64 build
  PI_GEN_COMMIT: d01290946bae8acba172d99c8d4aa3fb335fcf6d

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        board: ${{ github.event.inputs.board == 'all' && fromJSON('["zero2w","pi4","pi5"]') || fromJSON(format('["{0}"]', github.event.inputs.board)) }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          version=$(python3 -c "exec(open('api/__init__.py').read()); print(__version__)")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Building image for Agora v$version (${{ matrix.board }})"

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            coreutils quilt parted debootstrap zerofree zip \
            dosfstools libcap2-bin libarchive-tools grep rsync xz-utils \
            curl file git kmod bc gpg pigz

      - name: Clone pi-gen
        run: |
          git clone https://github.com/RPi-Distro/pi-gen.git /tmp/pi-gen
          cd /tmp/pi-gen
          git checkout ${{ env.PI_GEN_COMMIT }}

      - name: Configure pi-gen
        run: |
          TIMEZONE="Etc/UTC"

          # Copy our custom stage into pi-gen tree
          cp -r pi-gen/stage-agora /tmp/pi-gen/stage-agora
          touch /tmp/pi-gen/stage-agora/EXPORT_IMAGE

          # Create prerun.sh to copy rootfs from previous stage
          cat > /tmp/pi-gen/stage-agora/prerun.sh <<'PRERUN'
          #!/bin/bash -e
          if [ ! -d "${ROOTFS_DIR}" ]; then
            copy_previous
          fi
          PRERUN
          sed -i 's/^          //' /tmp/pi-gen/stage-agora/prerun.sh
          chmod +x /tmp/pi-gen/stage-agora/prerun.sh

          # Build config — explicit STAGE_LIST with correct ordering
          cat > /tmp/pi-gen/config <<EOF
          IMG_NAME=agora-${{ matrix.board }}
          RELEASE=trixie
          TARGET_HOSTNAME=agora
          FIRST_USER_NAME=agora
          FIRST_USER_PASS=agora
          DISABLE_FIRST_BOOT_USER_RENAME=1
          ENABLE_SSH=1
          LOCALE_DEFAULT=en_US.UTF-8
          KEYBOARD_KEYMAP=us
          KEYBOARD_LAYOUT="English (US)"
          TIMEZONE_DEFAULT=${TIMEZONE}
          DEPLOY_COMPRESSION=xz
          COMPRESSION_LEVEL=1
          STAGE_LIST="stage0 stage1 stage2 stage-agora"
          ENABLE_CLOUD_INIT=0
          AGORA_BOARD=${{ matrix.board }}
          EOF

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' /tmp/pi-gen/config

          echo "--- pi-gen config ---"
          cat /tmp/pi-gen/config

      - name: Build image
        run: |
          cd /tmp/pi-gen
          chmod +x build-docker.sh

          # Keepalive: print timestamp every 5 min so GHA knows the build is alive
          while true; do
            sleep 300
            echo "$(date -u '+%H:%M:%S') [keepalive] build still running..."
          done &
          KEEPALIVE_PID=$!

          ./build-docker.sh
          BUILD_EXIT=$?

          kill $KEEPALIVE_PID 2>/dev/null || true
          exit $BUILD_EXIT

      - name: Find and rename built image
        id: find-image
        run: |
          SRC_PATH=$(find /tmp/pi-gen/deploy -name '*.img.xz' -o -name '*.img.gz' -o -name '*.img.zip' -o -name '*.img' | head -1)
          if [ -z "$SRC_PATH" ]; then
            echo "ERROR: No image found in /tmp/pi-gen/deploy/"
            ls -laR /tmp/pi-gen/deploy/ || true
            exit 1
          fi
          echo "Found image: $SRC_PATH"

          # Rename to version-based name: agora-v0.9.0-pi-zero2w.img.xz
          VERSION="${{ steps.version.outputs.version }}"
          BOARD="${{ matrix.board }}"
          # Map board short names to image names
          case "$BOARD" in
            zero2w) IMAGE_BOARD="pi-zero2w" ;;
            pi4)    IMAGE_BOARD="pi4" ;;
            pi5)    IMAGE_BOARD="pi5" ;;
            *)      IMAGE_BOARD="$BOARD" ;;
          esac
          EXT="${SRC_PATH#*.img}"
          FINAL_NAME="agora-v${VERSION}-${IMAGE_BOARD}.img${EXT}"
          FINAL_PATH="/tmp/pi-gen/deploy/${FINAL_NAME}"
          mv "$SRC_PATH" "$FINAL_PATH"
          echo "Renamed to: $FINAL_NAME"
          echo "image-path=$FINAL_PATH" >> "$GITHUB_OUTPUT"
          echo "image-board=$IMAGE_BOARD" >> "$GITHUB_OUTPUT"

      - name: Upload image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: agora-v${{ steps.version.outputs.version }}-${{ steps.find-image.outputs.image-board }}
          path: ${{ steps.find-image.outputs.image-path }}
          retention-days: 30

      - name: Attach image to latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find the latest release
          TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || true)
          if [ -n "$TAG" ]; then
            echo "Uploading image to release $TAG"
            gh release upload "$TAG" "${{ steps.find-image.outputs.image-path }}" --clobber
          else
            echo "No release found — image available as workflow artifact only"
          fi
